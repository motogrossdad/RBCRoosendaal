<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBC Roosendaal - Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
    :root {
        --rbc-orange: #FF6B00;
        --dark: #0A0A0A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background-color: var(--dark);
        color: white;
        font-family: 'Oswald', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        width: 100%;
        padding: 30px 0;
        text-align: center;
        border-bottom: 2px solid var(--rbc-orange);
        background: linear-gradient(to bottom, #111, #000);
    }

    .logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 50px;
        letter-spacing: 2px;
    }

    /* THE AD-REDUCER CONTAINER */
    /* This "crops" the iframe to hide potential sidebar/top ads */
    .frame-container {
        width: 95%;
        max-width: 1100px;
        height: 1600px; /* Adjust based on how much content you want to show */
        margin: 40px 0;
        overflow: hidden; /* Hides the iframe's native scrollbars */
        border-radius: 12px;
        border: 1px solid #333;
        background: #fff;
        position: relative;
    }

    iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }

    footer {
        padding: 20px;
        color: #555;
        font-size: 12px;
    }
</style>
</head>
<body>

<header>
    <div class="logo">RBC <span style="color:var(--rbc-orange)">LIVE</span></div>
    <p style="color:#999; letter-spacing: 3px; font-size: 12px;">DERDE DIVISIE B DASHBOARD</p>
</header>

<div class="frame-container">
    <iframe 
        src="https://embed.hollandsevelden.nl/competities/2025-2026/landelijk/derde-divisie-b/?sTFC=%23ffffff&sBC=%23ffffff&sAC=%23f3f3f3" 
        scrolling="yes">
    </iframe>
</div>

<footer>
    Gegevens via HollandseVelden.nl &copy; 2026
</footer>

</body>
</html>
