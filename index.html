<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBC Roosendaal - Live Stand & Perioden</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --rbc-orange: #FF6B00;
  --rbc-white: #FFFFFF;
  --dark: #0A0A0A;
  --dark-card: #111111;
  --gray-border: #2A2A2A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Oswald', sans-serif;
  background: var(--dark);
  color: var(--rbc-white);
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HEADER STYLE */
header {
  width: 100%;
  padding: 40px 20px;
  text-align: center;
  background: linear-gradient(to bottom, #1a2b5c, var(--dark));
  border-bottom: 2px solid var(--rbc-orange);
}

.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 60px;
  letter-spacing: 4px;
  color: var(--rbc-white);
}

.logo-text span {
  color: var(--rbc-orange);
}

.subtitle {
  font-size: 14px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #999;
  margin-top: 10px;
}

/* CONTAINER FOR THE IFRAME */
.content-wrapper {
  width: 100%;
  max-width: 1000px;
  padding: 40px 10px;
}

.live-card {
  background: #FFFFFF; /* White background to match the iframe style */
  border-radius: 8px;
  padding: 5px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  overflow: hidden;
}

.footer {
  padding: 40px;
  text-align: center;
  font-size: 12px;
  color: #555;
}

/* Responsive height for mobile */
@media (max-width: 768px) {
  .logo-text { font-size: 40px; }
}
</style>
</head>
<body>

<header>
  <div class="logo-text">RBC <span>ROOSENDAAL</span></div>
  <div class="subtitle">Live Derde Divisie B Dashboard</div>
</header>

<div class="content-wrapper">
  <div class="live-card">
    <iframe src="https://embed.hollandsevelden.nl/competities/2025-2026/landelijk/derde-divisie-b/?sTFC=%23ffffff&amp;sBC=%23ffffff&amp;sAC=%23f3f3f3" 
            style="width:100%; min-width:100%; height:1700px; border:0;" 
            frameborder="0" 
            scrolling="no">
      <p>Bekijk de <a href="https://www.hollandsevelden.nl/competities/2025-2026/landelijk/derde-divisie-b/" target="_blank">live standen</a> op HollandseVelden.nl</p>
    </iframe>
    </div>
</div>

<footer class="footer">
  &copy; 2026 RBC Roosendaal Fansite - Data via HollandseVelden.nl
</footer>

</body>
</html>
