<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RBC">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/rbc.png">
<title>RBC Roosendaal – Derde Divisie B 2025/2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
    --orange: #FF6B00;
    --orange-dim: rgba(255,107,0,0.12);
    --orange-glow: rgba(255,107,0,0.25);
    --dark: #0a0a0a;
    --card: #141414;
    --card2: #1a1a1a;
    --border: #242424;
    --text: #e8e8e8;
    --muted: #666;
    --green: #27ae60;
    --red: #e74c3c;
    --amber: #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* ── HEADER ──────────────────────────────────────────────── */
header {
    background: linear-gradient(180deg, #161616 0%, #0f0f0f 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 140px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.18) 0%, transparent 70%);
    pointer-events: none;
}
.logo-badge {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
}
.logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(38px, 8vw, 60px);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 40%, #ccc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.logo-text span { -webkit-text-fill-color: var(--orange); }
.logo-sub {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
}
.header-divider {
    width: 40px; height: 2px;
    background: var(--orange);
    margin: 10px auto 0;
    border-radius: 2px;
}

/* ── SCOREBOARD ──────────────────────────────────────────── */
#scoreboard {
    background: #0f0f0f;
    border-bottom: 1px solid var(--border);
    display: none;
}
.sb-inner {
    display: flex;
    align-items: stretch;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
.sb-inner::-webkit-scrollbar { display: none; }
.sb-label {
    padding: 0 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 48px;
}
.sb-label.is-live { color: var(--red); }
.sb-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-right: 1px solid var(--border);
    font-size: 14px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.2s;
}
.sb-pill.is-rbc { background: var(--orange-dim); }
.sb-team { color: #bbb; font-weight: 500; }
.sb-team.is-rbc { color: var(--orange); font-weight: 700; }
.sb-score {
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    background: var(--card2);
    padding: 4px 11px;
    border-radius: 5px;
    letter-spacing: 1px;
    min-width: 38px;
    text-align: center;
}
.sb-score.is-live {
    background: var(--red);
    animation: sb-pulse 1.4s ease-in-out infinite;
}
@keyframes sb-pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.sb-status {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
}
.sb-status.is-live { color: var(--red); }
.live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: dot-blink 1.2s ease-in-out infinite;
}
@keyframes dot-blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

/* ── LAYOUT ──────────────────────────────────────────────── */
.main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 40px; }
.updated-bar {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 28px;
}
.block { margin-bottom: 36px; }
.section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
}
.section-header-bar {
    width: 3px;
    height: 20px;
    background: var(--orange);
    border-radius: 2px;
    flex-shrink: 0;
}
.section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
}

/* ── RBC SPOTLIGHT ───────────────────────────────────────── */
.spotlight {
    background: linear-gradient(135deg, #181818 0%, #141414 100%);
    border: 1px solid var(--border);
    border-left: 3px solid var(--orange);
    border-radius: 10px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
}
.spotlight::after {
    content: 'RBC';
    position: absolute;
    right: -10px; top: -20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 90px;
    color: rgba(255,107,0,0.04);
    pointer-events: none;
    line-height: 1;
}
.spotlight-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px;
    border-right: 1px solid var(--border);
}
.spotlight-item:last-child { border-right: none; }
.spotlight-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
}
.spotlight-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--orange);
    line-height: 1.1;
}
.spotlight-sub {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
}

/* ── STAND TABLE ─────────────────────────────────────────── */
.table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
}
.stand-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.stand-tbl thead th {
    padding: 9px 12px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--card2);
    text-align: right;
}
.stand-tbl thead th.left { text-align: left; }
.stand-tbl tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
}
.stand-tbl tbody tr:last-child td { border-bottom: none; }
.stand-tbl tbody tr.alt td { background: rgba(255,255,255,0.015); }
.stand-tbl tbody tr.rbc td {
    background: var(--orange-dim);
    color: var(--orange);
    font-weight: 700;
}
.stand-tbl .pos { color: var(--muted); text-align: right; width: 30px; }
.stand-tbl .club { text-align: left; font-weight: 600; }
.stand-tbl tr.rbc .club { color: var(--orange); }
.stand-tbl .pnt { font-weight: 800; color: #fff; }
.stand-tbl tr.rbc .pnt { color: var(--orange); }
.stand-tbl .wgv { color: #888; font-size: 11px; }
.stand-tbl .promo td { border-bottom: 2px solid var(--green) !important; }
.stand-tbl .playoff td { border-bottom: 2px solid var(--amber) !important; }
.stand-tbl .relegate td { border-bottom: 2px solid var(--red) !important; }
.ds-pos { color: var(--green); }
.ds-neg { color: var(--red); }
.ds-zero { color: var(--muted); }
.stand-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 10px 14px;
    background: var(--card2);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
}
.leg-item { display: flex; align-items: center; gap: 7px; }
.leg-line { width: 20px; height: 2px; border-radius: 2px; flex-shrink: 0; }
@media (max-width: 560px) {
    .stand-tbl .hide-mob { display: none; }
}

/* ── PERIODS ─────────────────────────────────────────────── */
.periods-scroll {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
}
@media (max-width: 700px) {
    .periods-scroll {
        display: flex;
        overflow-x: auto;
        gap: 12px;
        padding-bottom: 8px;
        scrollbar-width: none;
        -ms-overflow-style: none;
        scroll-snap-type: x mandatory;
    }
    .periods-scroll::-webkit-scrollbar { display: none; }
    .period-card { min-width: 82vw; scroll-snap-align: start; flex-shrink: 0; }
}
.period-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
}
.period-card-head {
    background: var(--orange);
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    color: #fff;
}
.period-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.period-tbl thead th {
    padding: 6px 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--card2);
    text-align: right;
}
.period-tbl thead th.left { text-align: left; }
.period-tbl td { padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: right; }
.period-tbl tbody tr:last-child td { border-bottom: none; }
.period-tbl tr.alt td { background: rgba(255,255,255,0.015); }
.period-tbl tr.rbc td { background: var(--orange-dim); color: var(--orange); font-weight: 700; }
.period-tbl .pnt { font-weight: 800; color: #fff; }
.period-tbl tr.rbc .pnt { color: var(--orange); }

/* ── FIXTURES ────────────────────────────────────────────── */
.fixture-list { display: flex; flex-direction: column; gap: 10px; }
.fixture-date-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
}
.fixture-date-head {
    background: var(--card2);
    padding: 9px 16px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
}
.fixture-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    font-size: 13px;
    transition: background 0.15s;
}
.fixture-row:last-child { border-bottom: none; }
.fixture-row.is-rbc { background: var(--orange-dim); }
.fixture-home { text-align: right; font-weight: 500; }
.fixture-away { text-align: left; font-weight: 500; }
.fixture-home.is-rbc, .fixture-away.is-rbc { color: var(--orange); font-weight: 700; }
.fixture-vs {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    padding: 0 4px;
    text-align: center;
    flex-shrink: 0;
}
.fixture-time {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
    min-width: 60px;
}

/* ── SHARED ──────────────────────────────────────────────── */
.loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 50px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
}
.spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { text-align: center; padding: 40px 20px; color: var(--red); font-size: 13px; }
.error-state a { color: var(--orange); text-decoration: none; }

footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    letter-spacing: 0.5px;
}
footer a { color: #555; text-decoration: none; }
footer a:hover { color: var(--orange); }

/* ── FORM DOTS ───────────────────────────────────────────── */
.form-dots {
    display: flex;
    align-items: center;
    gap: 5px;
    justify-content: center;
    margin-top: 6px;
}
.form-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
}
.form-dot.w { background: var(--green); }
.form-dot.d { background: var(--amber); }
.form-dot.l { background: var(--red); }

/* ── BOTTOM NAV ──────────────────────────────────────────── */
#bottom-nav {
    display: none;
}
@media (max-width: 768px) {
    #bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(14,14,14,0.97);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border);
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .main { padding-bottom: 80px; }
    footer { margin-bottom: 60px; }
}
.nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 0 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
}
.nav-tab.active { color: var(--orange); }
.nav-tab svg { width: 20px; height: 20px; stroke-width: 1.8; }
.nav-tab-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--orange);
    opacity: 0;
    transition: opacity 0.15s;
    margin-top: -2px;
}
.nav-tab.active .nav-tab-dot { opacity: 1; }
#ere-scoreboard {
    background: #0c0c0c;
    border-bottom: 1px solid var(--border);
}
.ere-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 13px;
    border-right: 1px solid var(--border);
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
}
.ere-team { color: #888; font-weight: 500; font-size: 12px; }
.ere-score {
    font-weight: 800;
    font-size: 12px;
    color: #ccc;
    background: var(--card2);
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 1px;
    min-width: 32px;
    text-align: center;
}
.ere-score.is-live { background: var(--red); color: #fff; animation: sb-pulse 1.4s ease-in-out infinite; }
.ere-status { font-size: 8px; font-weight: 700; letter-spacing: 1px; color: var(--muted); }
.ere-status.is-live { color: var(--red); }
#install-banner {
    display: none;
    position: fixed;
    bottom: 72px;
    right: 12px;
    z-index: 200;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,0,0.5);
    display: none;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo-badge">
        <div class="logo-text">RBC <span>Roosendaal</span></div>
        <div class="logo-sub">Derde Divisie B &mdash; 2025/2026</div>
        <div class="header-divider"></div>
    </div>
</header>

<!-- SCOREBOARD BAR -->
<div id="scoreboard">
    <div class="sb-inner" id="sb-inner">
        <span class="sb-label" id="sb-label">Resultaten</span>
    </div>
</div>

<!-- EREDIVISIE BAR -->
<div id="ere-scoreboard" style="display:none">
    <div class="sb-inner" id="ere-inner">
        <span class="sb-label" id="ere-label" style="font-size:8px">Eredivisie</span>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <p class="updated-bar" id="updatedBar">Laden...</p>

    <!-- RBC SPOTLIGHT -->
    <div id="spotlight-wrap"></div>

    <!-- STAND -->
    <div class="block" id="section-stand">
        <div class="section-header">
            <div class="section-header-bar"></div>
            <span class="section-title">Stand &mdash; Derde Divisie B</span>
        </div>
        <div id="stand-content">
            <div class="loading-state"><div class="spinner"></div>Stand laden</div>
        </div>
    </div>

    <!-- PERIODES -->
    <div class="block" id="section-periodes">
        <div class="section-header">
            <div class="section-header-bar"></div>
            <span class="section-title">Periodestanden</span>
        </div>
        <div id="periodes-content">
            <div class="loading-state"><div class="spinner"></div>Periodes laden</div>
        </div>
    </div>

    <!-- FIXTURES -->
    <div class="block" id="section-wedstrijden">
        <div class="section-header">
            <div class="section-header-bar"></div>
            <span class="section-title">Resterende Wedstrijden</span>
        </div>
        <div id="programma-content">
            <div class="loading-state"><div class="spinner"></div>Programma laden</div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 RBC Roosendaal Fansite &nbsp;&bull;&nbsp;
    Data: <a href="https://www.hollandsevelden.nl/" target="_blank" rel="noopener">HollandseVelden.nl</a>
</footer>

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
    <button class="nav-tab active" onclick="navTo('section-stand',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Stand
        <div class="nav-tab-dot"></div>
    </button>
    <button class="nav-tab" onclick="navTo('section-periodes',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
        </svg>
        Kampionen
        <div class="nav-tab-dot"></div>
    </button>
    <button class="nav-tab" onclick="navTo('section-wedstrijden',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        Wedstrijden
        <div class="nav-tab-dot"></div>
    </button>
</nav>

<script>
const SOURCE = 'https://www.hollandsevelden.nl/competities/2025-2026/landelijk/derde-divisie-b/';
const PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest='
];

async function fetchWithFallback(url) {
    for (const proxy of PROXIES) {
        try {
            const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
            if (res.ok) return await res.text();
        } catch (e) { /* try next */ }
    }
    throw new Error('Alle proxies mislukt');
}

function ds(val) {
    const n = parseInt(val, 10);
    return n > 0 ? 'ds-pos' : (n < 0 ? 'ds-neg' : 'ds-zero');
}

// ── SPOTLIGHT ──────────────────────────────────────────────
function buildSpotlight(doc) {
    // Position from stand
    let pos = '–', pnt = '–', wgv = '–';
    for (const h2 of doc.querySelectorAll('h2')) {
        if (!h2.textContent.includes('Stand')) continue;
        let el = h2.nextElementSibling;
        while (el) {
            const t = el.querySelector && (el.querySelector('table') || (el.tagName==='TABLE'?el:null));
            if (t) {
                t.querySelectorAll('tbody tr').forEach(row => {
                    const cells = row.querySelectorAll('th,td');
                    if (cells.length < 5) return;
                    const club = cells[1].textContent.trim().replace(/\s+/g,' ');
                    if (/^rbc$/i.test(club)) {
                        pos = cells[0].textContent.trim();
                        if (cells.length >= 9) {
                            wgv = cells[3].textContent.trim();
                            pnt = cells[4].textContent.trim();
                        } else {
                            const w=cells[3].textContent.trim(),g=cells[4].textContent.trim(),v=cells[5].textContent.trim();
                            wgv=`${w}-${g}-${v}`; pnt=cells[9]?cells[9].textContent.trim():'–';
                        }
                    }
                });
                break;
            }
            if (el.matches && el.matches('h2,h3')) break;
            el = el.nextElementSibling;
        }
        break;
    }

    // Last result + form (last 5 RBC results)
    let lastResult = '–', lastOpp = '–';
    const formResults = [];
    for (const h2 of doc.querySelectorAll('h2')) {
        if (!h2.textContent.includes('Uitslagen')) continue;
        let container = h2.parentElement;
        while (container && !container.querySelector('table.match, table[class*="match"]')) {
            container = container.parentElement;
            if (!container || container.tagName==='BODY') break;
        }
        if (container) {
            const tables = [...container.querySelectorAll('table.match,table[class*="match"]')].filter(t => {
                const r = t.querySelector('td.result,td[class*="result"]');
                return r && /\d/.test(r.textContent) && !r.textContent.includes('uur');
            });
            for (let i = tables.length-1; i>=0; i--) {
                const rows = tables[i].querySelectorAll('tbody tr');
                for (const row of rows) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length < 4) continue;
                    const home = cells[0].textContent.trim().replace(/\s+/g,' ');
                    const away = cells[2].textContent.trim().replace(/\s+/g,' ');
                    const result = cells[3].textContent.trim();
                    if (/^rbc$/i.test(home) || /^rbc$/i.test(away)) {
                        const rbcHome = /^rbc$/i.test(home);
                        const scores = result.match(/(\d+)\s*[-–]\s*(\d+)/);
                        if (scores) {
                            const rbcG = rbcHome ? +scores[1] : +scores[2];
                            const oppG = rbcHome ? +scores[2] : +scores[1];
                            const outcome = rbcG > oppG ? 'w' : (rbcG === oppG ? 'd' : 'l');
                            formResults.unshift(outcome); // most recent first
                        }
                        if (lastResult === '–') {
                            lastResult = result;
                            lastOpp = rbcHome ? away : home;
                        }
                    }
                }
                if (formResults.length >= 5) break;
            }
        }
        break;
    }

    // Next match datetime
    let nextOpp = '–', nextDate = '–', nextTimeStr = '14:30';
    for (const h2 of doc.querySelectorAll('h2')) {
        if (!h2.textContent.includes('Programma')) continue;
        let container = h2.parentElement;
        while (container && !container.querySelector('#programma-target,table.match')) {
            container = container.parentElement;
            if (!container || container.tagName==='BODY') break;
        }
        if (container) {
            const tables = [...container.querySelectorAll('table.match,table[class*="match"]')].filter(t => {
                const r = t.querySelector('td.result,td[class*="result"]');
                return r && r.textContent.includes('uur');
            });
            for (const t of tables) {
                const rows = t.querySelectorAll('tbody tr');
                for (const row of rows) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length < 4) continue;
                    const home = cells[0].textContent.trim().replace(/\s+/g,' ');
                    const away = cells[2].textContent.trim().replace(/\s+/g,' ');
                    if (/^rbc$/i.test(home) || /^rbc$/i.test(away)) {
                        nextOpp = /^rbc$/i.test(home) ? away : home;
                        const cap = t.querySelector('caption time,caption');
                        if (cap) {
                            const m = cap.textContent.match(/(\d{1,2})\s+(\w+)/);
                            nextDate = m ? m[1]+' '+m[2] : cap.textContent.trim();
                        }
                        // Parse kick-off time
                        const timeM = cells[3].textContent.match(/(\d+)[.:](\d+)/);
                        if (timeM) nextTimeStr = timeM[1]+':'+timeM[2];
                        break;
                    }
                }
                if (nextOpp !== '–') break;
            }
        }
        break;
    }

    // Build form dots HTML
    const last5 = formResults.slice(-5);
    const formHTML = last5.length
        ? `<div class="form-dots">${last5.map(r=>`<div class="form-dot ${r}" title="${r==='w'?'Winst':r==='d'?'Gelijk':'Verlies'}"></div>`).join('')}</div>`
        : '';

    const wrap = document.getElementById('spotlight-wrap');
    wrap.innerHTML = `
    <div class="spotlight">
        <div class="spotlight-item">
            <span class="spotlight-label">Stand</span>
            <span class="spotlight-value">${pos}e</span>
            <span class="spotlight-sub">${pnt} punten</span>
            ${formHTML}
        </div>
        <div class="spotlight-item">
            <span class="spotlight-label">Laatste uitslag</span>
            <span class="spotlight-value" style="font-size:16px;letter-spacing:2px">${lastResult}</span>
            <span class="spotlight-sub">${lastOpp}</span>
        </div>
        <div class="spotlight-item">
            <span class="spotlight-label">Volgende Wedstrijd</span>
            <span class="spotlight-value" style="font-size:16px;line-height:1.2">${nextDate}</span>
            <span class="spotlight-sub" style="font-size:11px;margin-top:1px">${nextTimeStr} uur &bull; ${nextOpp}</span>
        </div>
    </div>`;

}

// ── SCOREBOARD ─────────────────────────────────────────────
function buildScoreboard(doc) {
    const board  = document.getElementById('scoreboard');
    const inner  = document.getElementById('sb-inner');
    const label  = document.getElementById('sb-label');

    let resultTables = [];
    for (const h2 of doc.querySelectorAll('h2')) {
        if (!h2.textContent.includes('Uitslagen')) continue;
        let container = h2.parentElement;
        while (container && !container.querySelector('table.match,table[class*="match"]')) {
            container = container.parentElement;
            if (!container || container.tagName==='BODY') break;
        }
        if (container) {
            container.querySelectorAll('table.match,table[class*="match"]').forEach(t => {
                const res = t.querySelector('td.result,td[class*="result"]');
                if (res && /\d/.test(res.textContent) && !res.textContent.includes('uur')) resultTables.push(t);
            });
        }
        break;
    }
    if (!resultTables.length) { board.style.display='none'; return; }

    function parseDutchDate(str) {
        const mo={januari:0,februari:1,maart:2,april:3,mei:4,juni:5,
                  juli:6,augustus:7,september:8,oktober:9,november:10,december:11};
        const m = str.replace(/^\w+ /,'').match(/(\d+)\s+(\w+)\s+(\d{4})/);
        if (!m) return new Date(0);
        return new Date(+m[3], mo[m[2].toLowerCase()]??0, +m[1]);
    }
    const byDate = {}; const dateOrder = [];
    resultTables.forEach(t => {
        const cap = t.querySelector('caption time,caption');
        const d = cap ? cap.textContent.trim() : '';
        if (!byDate[d]) { byDate[d]=[]; dateOrder.push(d); }
        byDate[d].push(t);
    });
    let latestText=''; let latestDate=new Date(0);
    dateOrder.forEach(d => { const p=parseDutchDate(d); if(p>latestDate){latestDate=p;latestText=d;} });
    const latestMatches = byDate[latestText]||[];
    if (!latestMatches.length) { board.style.display='none'; return; }

    const now = new Date();
    const isToday = latestDate.toDateString()===now.toDateString();
    const h = now.getHours();
    const mightBeLive = isToday && h>=11 && h<21;

    let pills = '';
    latestMatches.forEach(t => {
        t.querySelectorAll('tbody tr').forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length < 4) return;
            const home   = cells[0].textContent.trim().replace(/\s+/g,' ');
            const away   = cells[2].textContent.trim().replace(/\s+/g,' ');
            const result = cells[3].textContent.trim();
            const rbcH = /^rbc$/i.test(home), rbcA = /^rbc$/i.test(away);
            pills += `<div class="sb-pill${(rbcH||rbcA)?' is-rbc':''}">
                <span class="sb-team${rbcH?' is-rbc':''}">${home}</span>
                <span class="sb-score${mightBeLive?' is-live':''}">${result}</span>
                <span class="sb-team${rbcA?' is-rbc':''}">${away}</span>
                ${mightBeLive
                    ? `<span class="live-dot"></span><span class="sb-status is-live">Live</span>`
                    : `<span class="sb-status">FT</span>`}
            </div>`;
        });
    });
    if (!pills) { board.style.display='none'; return; }

    label.className = 'sb-label' + (mightBeLive ? ' is-live' : '');
    label.textContent = mightBeLive ? 'LIVE' : latestText.replace(/\w+ /,'');
    inner.querySelectorAll('.sb-pill').forEach(el=>el.remove());
    inner.insertAdjacentHTML('beforeend', pills);
    board.style.display = 'block';
}

// ── STAND ──────────────────────────────────────────────────
function buildStand(doc) {
    let standTable = null;
    for (const h2 of doc.querySelectorAll('h2')) {
        if (!h2.textContent.includes('Stand')) continue;
        let el = h2.nextElementSibling;
        while (el) {
            const t = el.querySelector('table')||(el.tagName==='TABLE'?el:null);
            if (t) { standTable=t; break; }
            if (el.matches('h2,h3')) break;
            el = el.nextElementSibling;
        }
        if (!standTable) {
            let p = h2.parentElement;
            while (p) { const t=p.querySelector('table'); if(t){standTable=t;break;} p=p.parentElement; if(!p||p.tagName==='BODY')break; }
        }
        break;
    }
    if (!standTable) return '<div class="error-state">Stand niet gevonden</div>';

    const rows = standTable.querySelectorAll('tbody tr');
    const cls = standTable.className;
    const prM=cls.match(/promote-(\d+)/), plM=cls.match(/playoff-(\d+)/), reM=cls.match(/relegate-(\d+)/);
    const promoteAt = prM ? +prM[1] : 1;
    const playoffAt = plM ? +plM[1] : 0;
    const relegateAt = reM ? (rows.length - +reM[1]) : rows.length;

    let html = `<div class="table-card"><table class="stand-tbl">
        <thead><tr>
            <th class="left" style="width:30px">#</th>
            <th class="left">Club</th>
            <th>Wed</th>
            <th class="hide-mob">W-G-V</th>
            <th>Pnt</th>
            <th class="hide-mob">DV</th>
            <th class="hide-mob">DT</th>
            <th>DS</th>
        </tr></thead><tbody>`;

    rows.forEach((row,i) => {
        const cells = row.querySelectorAll('th,td');
        if (cells.length < 5) return;
        const posN = cells[0].textContent.trim();
        const club = cells[1].textContent.trim().replace(/\s+/g,' ');
        const wed  = cells[2]?.textContent.trim()||'';
        let wgv='',pnt='',dv='',dt='',dsv='';
        if (cells.length >= 9) {
            wgv=cells[3]?.textContent.trim()||''; pnt=cells[4]?.textContent.trim()||'';
            dv=cells[5]?.textContent.trim()||''; dt=cells[6]?.textContent.trim()||''; dsv=cells[7]?.textContent.trim()||'';
        } else {
            const w=cells[3]?.textContent.trim()||'',g=cells[4]?.textContent.trim()||'',v=cells[5]?.textContent.trim()||'';
            wgv=`${w}-${g}-${v}`; dv=cells[6]?.textContent.trim()||''; dt=cells[7]?.textContent.trim()||'';
            dsv=cells[8]?.textContent.trim()||''; pnt=cells[9]?.textContent.trim()||'';
        }
        const p=+posN, isRBC=/^rbc$/i.test(club), alt=i%2===1;
        let rowCls = isRBC ? 'rbc' : (alt ? 'alt' : '');
        if (p===promoteAt)  rowCls += ' promo';
        if (p===playoffAt)  rowCls += ' playoff';
        if (p===relegateAt) rowCls += ' relegate';
        html += `<tr class="${rowCls.trim()}">
            <td class="pos">${posN}</td>
            <td class="club">${club}</td>
            <td>${wed}</td>
            <td class="wgv hide-mob">${wgv}</td>
            <td class="pnt">${pnt}</td>
            <td class="hide-mob">${dv}</td>
            <td class="hide-mob">${dt}</td>
            <td class="${ds(dsv)}">${dsv}</td>
        </tr>`;
    });

    html += `</tbody></table>
    <div class="stand-legend">
        <div class="leg-item"><div class="leg-line" style="background:var(--green)"></div>Directe promotie naar Tweede Divisie</div>
        <div class="leg-item"><div class="leg-line" style="background:var(--amber)"></div>Nacompetitie</div>
        <div class="leg-item"><div class="leg-line" style="background:var(--red)"></div>Directe degradatie naar Vierde Divisie</div>
    </div></div>`;
    return html;
}

// ── PERIODES ───────────────────────────────────────────────
function buildPeriodes(doc) {
    let container = null;
    for (const h2 of doc.querySelectorAll('h2')) {
        if (!h2.textContent.includes('Periodestanden')) continue;
        let el = h2.parentElement;
        while (el && !el.querySelector('table.league-sm,table[class*="league"]')) { el=el.parentElement; }
        container = el || h2.closest('.card') || h2.parentElement;
        break;
    }
    if (!container) return '<div class="error-state">Periodestanden niet gevonden</div>';
    const tables = container.querySelectorAll('table');
    if (!tables.length) return '<div class="error-state">Geen periode-tabellen</div>';

    let html = '<div class="periods-scroll">';
    tables.forEach((tbl,idx) => {
        const cap = tbl.querySelector('caption,thead h3');
        const name = cap ? cap.textContent.trim() : ('Periode '+(idx+1));
        const rows = tbl.querySelectorAll('tbody tr');
        if (!rows.length) return;
        let card = `<div class="period-card">
            <div class="period-card-head">${name}</div>
            <table class="period-tbl">
                <thead><tr>
                    <th class="left" style="width:24px">#</th>
                    <th class="left">Club</th>
                    <th>Wed</th>
                    <th>Pnt</th>
                    <th>DS</th>
                </tr></thead><tbody>`;
        rows.forEach((row,i) => {
            const cells = row.querySelectorAll('th,td');
            if (cells.length < 4) return;
            const pos=cells[0].textContent.trim(), club=cells[1].textContent.trim().replace(/\s+/g,' ');
            const wed=cells[2].textContent.trim(), pnt=cells[3].textContent.trim();
            const dsv=cells[4]?cells[4].textContent.trim():'';
            const isRBC=/^rbc$/i.test(club), isW=pos==='1', alt=i%2===1;
            const rowCls = isRBC?'rbc':(alt?'alt':'');
            card += `<tr class="${rowCls}">
                <td>${pos}</td>
                <td class="left" style="font-weight:${isW||isRBC?'700':'500'}">${isW&&!isRBC?'&#x1F947; ':''}${club}</td>
                <td>${wed}</td>
                <td class="pnt">${pnt}</td>
                <td class="${ds(dsv)}">${dsv}</td>
            </tr>`;
        });
        card += '</tbody></table></div>';
        html += card;
    });
    html += '</div>';
    return html;
}

// ── PROGRAMMA ─────────────────────────────────────────────
function buildProgramma(doc) {
    let container = null;
    for (const h2 of doc.querySelectorAll('h2')) {
        if (!h2.textContent.includes('Programma')) continue;
        let el = h2.parentElement;
        while (el && !el.querySelector('#programma-target,table.match')) {
            el=el.parentElement; if (!el||el.tagName==='BODY') break;
        }
        container = el; break;
    }
    if (!container) return '<div class="error-state">Programma niet gevonden</div>';

    const matchTables = [...container.querySelectorAll('table.match,table[class*="match"]')].filter(t => {
        const r = t.querySelector('td.result,td[class*="result"]');
        if (!r) return false;
        const txt = r.textContent.trim();
        return txt.includes('uur') || !((/^\d/.test(txt)) && txt.includes('-'));
    });
    if (!matchTables.length) return '<div class="error-state">Geen resterende wedstrijden</div>';

    const byDate = {}, order = [];
    matchTables.forEach(t => {
        const cap = t.querySelector('caption time,caption');
        const d = cap ? cap.textContent.trim() : 'Onbekend';
        if (!byDate[d]) { byDate[d]=[]; order.push(d); }
        byDate[d].push(t);
    });

    let html = '<div class="fixture-list">';
    order.forEach(date => {
        html += `<div class="fixture-date-card">
            <div class="fixture-date-head">${date}</div>`;
        byDate[date].forEach(t => {
            t.querySelectorAll('tbody tr').forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length < 4) return;
                const home = cells[0].textContent.trim().replace(/\s+/g,' ');
                const away = cells[2].textContent.trim().replace(/\s+/g,' ');
                const time = cells[3].textContent.trim();
                const rbcH=/^rbc$/i.test(home), rbcA=/^rbc$/i.test(away);
                html += `<div class="fixture-row${(rbcH||rbcA)?' is-rbc':''}">
                    <span class="fixture-home${rbcH?' is-rbc':''}">${home}</span>
                    <span class="fixture-vs">vs</span>
                    <span class="fixture-away${rbcA?' is-rbc':''}">${away}</span>
                    <span class="fixture-time">${time}</span>
                </div>`;
            });
        });
        html += '</div>';
    });
    html += '</div>';
    return html;
}

// ── EREDIVISIE ────────────────────────────────────────────
async function buildEredivisie() {
    const board = document.getElementById('ere-scoreboard');
    const inner = document.getElementById('ere-inner');
    const label = document.getElementById('ere-label');
    try {
        const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/ned.1/scoreboard', { signal: AbortSignal.timeout(6000) });
        if (!res.ok) return;
        const data = await res.json();
        const events = data.events || [];
        if (!events.length) return;

        const now = new Date();
        const h = now.getHours();
        let pills = '';
        let hasLive = false;

        events.forEach(ev => {
            const comp = ev.competitions?.[0];
            if (!comp) return;
            const home = comp.competitors?.find(c => c.homeAway === 'home');
            const away = comp.competitors?.find(c => c.homeAway === 'away');
            if (!home || !away) return;
            const homeTeam = home.team?.shortDisplayName || home.team?.displayName || '?';
            const awayTeam = away.team?.shortDisplayName || away.team?.displayName || '?';
            const homeScore = home.score ?? '';
            const awayScore = away.score ?? '';
            const statusName = ev.status?.type?.name || '';
            const isLive = statusName === 'STATUS_IN_PROGRESS' || statusName === 'STATUS_HALFTIME';
            const isFinal = statusName === 'STATUS_FINAL';
            const shortDetail = ev.status?.type?.shortDetail || '';
            if (!isFinal && !isLive) return; // skip scheduled
            if (isLive) hasLive = true;
            const scoreDisplay = (homeScore !== '' && awayScore !== '') ? `${homeScore} - ${awayScore}` : '? - ?';
            const statusLabel = isLive ? shortDetail || 'LIVE' : 'FT';
            pills += `<div class="ere-pill">
                <span class="ere-team">${homeTeam}</span>
                <span class="ere-score${isLive ? ' is-live' : ''}">${scoreDisplay}</span>
                <span class="ere-team">${awayTeam}</span>
                <span class="ere-status${isLive ? ' is-live' : ''}">${statusLabel}</span>
            </div>`;
        });

        if (!pills) return;
        label.textContent = hasLive ? '🔴 Eredivisie' : 'Eredivisie';
        inner.querySelectorAll('.ere-pill').forEach(el => el.remove());
        inner.insertAdjacentHTML('beforeend', pills);
        board.style.display = 'block';
    } catch(e) { /* silent fail */ }
}

// ── MAIN ──────────────────────────────────────────────────
async function load(fullRefresh = true) {
    try {
        const html = await fetchWithFallback(SOURCE);
        const doc = new DOMParser().parseFromString(html, 'text/html');

        buildScoreboard(doc);
        buildEredivisie();
        buildSpotlight(doc);

        if (fullRefresh) {
            document.getElementById('stand-content').innerHTML    = buildStand(doc);
            document.getElementById('periodes-content').innerHTML = buildPeriodes(doc);
            document.getElementById('programma-content').innerHTML= buildProgramma(doc);

            const now = new Date();
            document.getElementById('updatedBar').textContent = 'Bijgewerkt ' +
                now.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'}) +
                ' om ' + now.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
        }
    } catch(err) {
        console.error(err);
        if (fullRefresh) {
            const errHTML = `<div class="error-state">Kon data niet laden.<br><br>
                <a href="${SOURCE}" target="_blank" rel="noopener">Bekijk op HollandseVelden.nl &rarr;</a></div>`;
            ['stand-content','periodes-content','programma-content'].forEach(id => {
                document.getElementById(id).innerHTML = errHTML;
            });
            document.getElementById('updatedBar').textContent = '';
        }
    }
}

let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'block';
});
window.addEventListener('appinstalled', () => {
    document.getElementById('install-banner').style.display = 'none';
    _deferredPrompt = null;
});
function installApp() {
    if (!_deferredPrompt) return;
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(() => {
        _deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';

}

// ── BOTTOM NAV ────────────────────────────────────────────
function navTo(sectionId, btn) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const el = document.getElementById(sectionId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Highlight active tab on scroll
const sections = ['section-stand','section-periodes','section-wedstrijden'];
const tabs = document.querySelectorAll('.nav-tab');
if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const idx = sections.indexOf(entry.target.id);
                if (idx >= 0) {
                    tabs.forEach(t => t.classList.remove('active'));
                    if (tabs[idx]) tabs[idx].classList.add('active');
                }
            }
        });
    }, { rootMargin: '-40% 0px -50% 0px' });
    sections.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
}
