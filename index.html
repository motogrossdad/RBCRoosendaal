<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBC Roosendaal - Live Stand & Perioden</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
    :root {
        --rbc-orange: #FF6B00;
        --dark: #0A0A0A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background-color: var(--dark);
        color: white;
        font-family: 'Oswald', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        width: 100%;
        padding: 30px 0;
        text-align: center;
        border-bottom: 2px solid var(--rbc-orange);
        background: #111;
    }

    .logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 50px;
        letter-spacing: 2px;
    }

    /* THE DASHBOARD CONTAINER */
    .dashboard-container {
        width: 95%;
        max-width: 1100px;
        margin: 40px 0;
        background: #fff; /* White background so the data is readable */
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 10px 50px rgba(0,0,0,0.8);
    }

    /* WE USE A WRAPPER TO ENSURE THE FRAME IS STABLE */
    .iframe-wrapper {
        position: relative;
        width: 100%;
        height: 1700px; /* High enough to show the full table and periods */
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .info-bar {
        background: #f8f8f8;
        color: #333;
        padding: 10px;
        font-size: 13px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }
</style>
</head>
<body>

<header>
    <div class="logo">RBC <span style="color:var(--rbc-orange)">LIVE DATA</span></div>
    <p style="color:#999; letter-spacing: 3px; font-size: 12px;">DERDE DIVISIE B - 2025/2026</p>
</header>

<div class="dashboard-container">
    <div class="info-bar">
        📊 Gebruik de tabbladen hieronder voor <strong>Stand</strong>, <strong>Perioden</strong> en <strong>Programma</strong>.
    </div>
    
    <div class="iframe-wrapper">
        <iframe 
            src="https://embed.hollandsevelden.nl/competities/2025-2026/landelijk/derde-divisie-b/?sTFC=%23ffffff&sBC=%23ffffff&sAC=%23f3f3f3" 
            scrolling="no">
        </iframe>
    </div>
</div>

<footer style="padding: 20px; color: #555; font-size: 12px;">
    &copy; 2026 RBC Roosendaal Dashboard | Data powered by HollandseVelden.nl
</footer>

</body>
</html>
